---
name: code_suggestion_events_daily
engine: SummingMergeTree
engine_full: SummingMergeTree PARTITION BY toYear(date) ORDER BY (namespace_path,
  date, user_id, event, ide_name, language) SETTINGS index_granularity = 64
partition_key: toYear(date)
primary_key: namespace_path, date, user_id, event, ide_name, language
sorting_key: namespace_path, date, user_id, event, ide_name, language
settings:
  index_granularity: '64'
columns:
- name: namespace_path
  type: String
  default_kind: DEFAULT
  default_expression: "'0/'"
  is_in_sorting_key: true
  is_in_primary_key: true
- name: user_id
  type: UInt64
  default_kind: DEFAULT
  default_expression: '0'
  is_in_sorting_key: true
  is_in_primary_key: true
- name: date
  type: Date32
  default_kind: DEFAULT
  default_expression: toDate(now64())
  is_in_partition_key: true
  is_in_sorting_key: true
  is_in_primary_key: true
- name: event
  type: UInt8
  default_kind: DEFAULT
  default_expression: '0'
  is_in_sorting_key: true
  is_in_primary_key: true
- name: ide_name
  type: LowCardinality(String)
  default_kind: DEFAULT
  default_expression: "''"
  is_in_sorting_key: true
  is_in_primary_key: true
- name: language
  type: LowCardinality(String)
  default_kind: DEFAULT
  default_expression: "''"
  is_in_sorting_key: true
  is_in_primary_key: true
- name: suggestions_size_sum
  type: UInt32
  default_kind: DEFAULT
  default_expression: '0'
- name: occurrences
  type: UInt64
  default_kind: DEFAULT
  default_expression: '0'
